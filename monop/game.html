<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monop — Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanlines"></div>

  <div class="game-wrap">
    <aside class="sidebar left">
      <div class="panel" id="player-panel">
        <h3 class="panel-title" data-i18n="player">PEMAIN</h3>
        <div class="player-chip" id="p-chip">
          <div class="chip-color" style="background:#f0c040"></div>
          <div class="chip-info">
            <div class="chip-name" id="p-name">You</div>
            <div class="chip-cash" id="p-cash">$1,500</div>
          </div>
        </div>
        <div class="stats" id="p-stats">
          <div class="stat"><span data-i18n="netWorth">Kekayaan</span><b id="p-net">$1,500</b></div>
          <div class="stat"><span data-i18n="properties">Properti</span><b id="p-props">0</b></div>
        </div>
        <div class="player-cards" id="p-deeds"></div>
      </div>
      <div class="panel log-panel">
        <h3 class="panel-title">LOG</h3>
        <div class="log-scroll" id="log"></div>
      </div>
    </aside>

    <section class="board-area">
      <div class="top-hud">
        <div class="turn-badge" id="turn-badge"><span class="dot" id="turn-dot"></span> <span id="turn-text">Giliranmu</span></div>
        <div class="hud-center">
          <button class="hud-btn" id="btn-pause">❚❚</button>
        </div>
      </div>

      <div class="monopoly-board" id="board">
        <!-- 40 tiles generated by JS -->
      </div>

      <div class="board-overlay hidden" id="board-overlay"></div>

      <div class="action-bar" id="action-bar">
        <div class="dice-box" id="dice-box">
          <div class="die" id="die1">⚅</div>
          <div class="die" id="die2">⚅</div>
        </div>
        <div class="action-btns" id="actions"></div>
      </div>
    </section>

    <aside class="sidebar right">
      <div class="panel" id="bots-panel">
        <h3 class="panel-title" data-i18n="ai">KOMPUTER</h3>
        <div id="bots-list"></div>
      </div>
      <div class="panel" id="freeparking-panel">
        <h3 class="panel-title" data-i18n="freeParking">PARKIR GRATIS</h3>
        <div class="fp-pot" id="fp-pot">$0</div>
      </div>
    </aside>
  </div>

  <!-- Modal system -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="modal">
      <h3 id="modal-title">Judul</h3>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
